prSections:
  - title: Mine
    filters: is:open author:@me
  - title: Review
    filters: is:open review-requested:@me
  - title: Commented
    filters: is:open commenter:@me
issuesSections:
  - title: Creator
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Commented
    filters: is:open commenter:@me -author:@me

repoPaths:
  "*": ~/workspace/*

repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

defaults:
  preview:
    open: true
    width: 70
  prApproveComment: LGTM
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        hidden: true
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        hidden: true
      base:
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        hidden: true
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: false

keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
  prs:
    - key: C
      name: code review
      command: >
        tmux new-window -n '{{.HeadRefName}}' 'wt switch pr:{{.PrNumber}} -x "cursor-agent '\''Use the review-pr skill to review this PR.'\''"'
    - key: c
      name: review comments
      command: >
        tmux new-window -n '{{.HeadRefName}}' 'wt switch pr:{{.PrNumber}} -x "cursor-agent '\''Use the review-pr-comments skill to review and address comments on this PR.'\''"'
    - key: O
      name: open in tmux
      command: >
        tmux new-window -n '{{.HeadRefName}}' 'wt switch pr:{{.PrNumber}} && $SHELL'

theme:
  colors:
    text:
      primary: "#cdd6f4"
      secondary: "#89b4fa"
      inverted: "#1e1e2e"
      faint: "#6c7086"
      warning: "#f38ba8"
      success: "#a6e3a1"
    background:
      selected: "#45475a"
    border:
      primary: "#b4befe"
      secondary: "#a6e3a1"
      faint: "#313244"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true

pager:
  diff: "delta"

smartFilteringAtLaunch: true
