# Theme
include current-theme.conf

# Window appearance
background_opacity 1.0
# background_blur 32
hide_window_decorations titlebar-only
window_padding_width 8

# Font
font_family      family='JetBrainsMono Nerd Font Mono' postscript_name=JetBrainsMonoNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14.0

# Cursor
cursor_trail 10
cursor_trail_decay 0.1 0.15
cursor_trail_start_threshold 0

# Clipboard
copy_on_select yes

# macOS
macos_option_as_alt no

# Mouse
mouse_map right release ungrabbed paste_from_selection
mouse_map right press ungrabbed

# Unbind cmd+j/k to prevent interference with terminal applications
map cmd+j
map cmd+k

# Send escape+enter for shift+enter (useful for multiline input in shells)
map shift+enter send_text all \e\r
