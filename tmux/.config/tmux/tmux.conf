unbind C-o
unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g default-terminal "${TERM}"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-s

set -g mouse on

set -g base-index 1
set -g renumber-windows on
set -g status-position top

set -g main-pane-width 60%

set -g detach-on-destroy off

set -g history-limit 1000000

set-window-option -g mode-keys vi

# Session Management

bind L switch-client -l

# Pane Management

bind V split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

set -g @continuum-restore 'on'

set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-preview-enabled 'false'
set -g @sessionx-window-height '35%'
set -g @sessionx-window-width '35%'

# Open lazygit on current dir
# Source: https://github.com/ericmckevitt
bind g display-popup \
    -d "#{pane_current_path}" \
    -w 80% \
    -h 80% \
    -E "lazygit"

# Open terminal in current dir
bind t display-popup \
    -d "#{pane_current_path}" \
    -w 75% \
    -h 75% \
    -E "fish"

bind f display-popup \
    -d "#{pane_current_path}" \
    -w 90% \
    -h 90% \
    -E "yazi"

bind G new-window -n "gh-dash" "gh dash"

# Theme config
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left-length 100
set -g status-left ""

set -g status-right-length 100
set -g status-right ""
set -ag status-right '#{?window_zoomed_flag,#[fg=#{@thm_peach}]#[bg=default]#[fg=#{@thm_crust}]#[bg=#{@thm_peach}] 󰍉 #[fg=#{@thm_peach}]#[bg=default],}'
set -ag status-right '#{?window_zoomed_flag,#[bg=default] ,}'
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

set-window-option -g automatic-rename off
set-option -g allow-rename off
